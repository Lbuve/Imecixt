<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">

    <!-- Tailwind CSS -->

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <!-- CSS Files -->
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/cards.css">
    <link rel="stylesheet" href="css/modal.css">

    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="css/filters.css">

<body>
    
    <!-- Header (se carga dinámicamente) -->
    <div id="header-container"></div>

    <!-- Hero de Productos -->
    <section class="pt-24 sm:pt-28 md:pt-32 pb-6 sm:pb-8 bg-gradient-to-r from-red-500 via-red-600 to-red-800 text-white">
        <div class="container mx-auto px-4 text-center">

        </div>
    </section>

    <!-- Products Section -->
    <section id="productos" class="py-8 bg-white">
        <div class="container mx-auto px-4">
            <!-- Productos se cargan dinámicamente desde JS -->
            <div id="productos-container"></div>
        </div>
    </section>

    <!-- Contact Section -->
    <section id="contacto" class="py-12 sm:py-16 bg-gradient-to-r from-gray-50 to-gray-100">
        <div class="container mx-auto px-4 text-center">
            <h2 class="text-2xl sm:text-3xl md:text-4xl font-bold mb-3 sm:mb-4 text-gray-800">¿Necesitas más información?</h2>
            <p class="text-base sm:text-lg text-gray-600 mb-6 sm:mb-8 max-w-xl mx-auto">Contáctanos para cotizaciones y asesoramiento personalizado</p>
            <div class="flex flex-col sm:flex-row justify-center items-center gap-4 mb-8">
                <a href="https://wa.me/51924570575?text=Hola,%20me%20interesa%20información%20sobre%20sus%20productos%20de%20seguridad"
                   target="_blank"
                   class="inline-flex items-center gap-2 sm:gap-3 bg-green-500 hover:bg-green-600 text-white font-bold py-3 sm:py-4 px-6 sm:px-8 rounded-full shadow-lg transform hover:-translate-y-1 transition duration-300 text-sm sm:text-base">
                    <i class="fab fa-whatsapp text-xl sm:text-2xl"></i>
                    <span>924 570 575</span>
                </a>
                <a href="https://wa.me/51979771512?text=Hola,%20me%20interesa%20información%20sobre%20sus%20productos%20de%20seguridad"
                   target="_blank"
                   class="inline-flex items-center gap-2 sm:gap-3 bg-green-500 hover:bg-green-600 text-white font-bold py-3 sm:py-4 px-6 sm:px-8 rounded-full shadow-lg transform hover:-translate-y-1 transition duration-300 text-sm sm:text-base">
                    <i class="fab fa-whatsapp text-xl sm:text-2xl"></i>
                    <span>979 771 512</span>
                </a>
            </div>
            <!-- Google Maps -->
            <div class="mt-6 sm:mt-8 rounded-xl overflow-hidden shadow-lg max-w-3xl mx-auto px-4 sm:px-0">
                <div class="relative w-full" style="padding-bottom: 56.25%;">
                    <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3949.712718639946!2d-79.022738425217!3d-8.130702191899026!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x91ad3d0c626d35f7%3A0x460adfa1ca48a255!2sEXTINTORES%20IMECIXT%20S.A.C!5e0!3m2!1ses!2spe!4v1778131517126!5m2!1ses!2spe" class="absolute top-0 left-0 w-full h-full" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>

            </div>
        </div>

    <!-- Footer (se carga dinámicamente) -->
    <div id="footer-container"></div>

    <!-- WhatsApp Floating Button -->
    <a href="https://wa.me/51924570575?text=Hola,%20me%20interesa%20información%20sobre%20sus%20productos%20de%20seguridad"
       target="_blank"
       class="whatsapp-float"

        <i class="fab fa-whatsapp"></i>
    </a>

    <script src="js/products.js"></script>
